spring.application.name=photo-archive

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/photoarchive_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# --- JPA / Hibernate ---
# Use 'validate' in production (set via JPA_DDL_AUTO env var). 'update' is safe for local dev only.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# --- JWT ---
# IMPORTANT: Override JWT_SECRET with a cryptographically strong value in production.
# Minimum 256-bit (32-byte) random string. Never commit a real secret to version control.
photoarchive.app.jwtSecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
photoarchive.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# --- File Storage ---
# Root directory for all uploads. Use an absolute path in production (e.g., /var/data/photo-archive).
photoarchive.app.upload-dir=${UPLOAD_DIR:uploads}

# --- Base URL ---
# Public base URL used to build view/download links in API responses.
# Override with APP_BASE_URL in production (e.g., https://api.yourdomain.com).
photoarchive.app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Multipart Upload (allow high-resolution photos) ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# --- Photo Visibility ---
# PUBLIC: view and search endpoints are accessible without authentication.
# PRIVATE: all endpoints require a valid JWT.
photoarchive.app.photo-visibility=${PHOTO_VISIBILITY:PRIVATE}

# --- CORS ---
# Comma-separated list of allowed frontend origins. Override via ALLOWED_ORIGINS env var.
# Example for multiple origins: https://app.domain.com,https://admin.domain.com
photoarchive.app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# --- Registration ---
# When true, new accounts are created with active=false and require admin approval
# before the user can authenticate. Set REQUIRE_ADMIN_APPROVAL=true in production
# to control who gains access to the archive.
photoarchive.app.require-admin-approval=${REQUIRE_ADMIN_APPROVAL:false}

# --- Cache (Caffeine) ---
# userDetails: caches UserDetailsService.loadUserByUsername results to avoid a DB
#   hit on every authenticated request; evicted automatically on role/status changes.
# roles: caches Role lookups; role records are essentially static configuration.
# Both caches share the same Caffeine spec: 1000 max entries, 5-minute write TTL.
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=300s
